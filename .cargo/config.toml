[build]
target = "xtensa-esp32-none-elf"

[target.'cfg(target_arch = "xtensa")']
runner = "espflash flash --monitor --partition-table partitions.csv"
rustflags = [
    "-C",
    "link-arg=-Wl,-Tlinkall.x",
    "-C",
    "link-arg=-nostartfiles",
]

[env]
ESP_LOG = { value = "info", force = false }
OTA_MANIFEST_URL = { value = "https://example.invalid/esp32-bms-gps/manifest.json", force = false }
DEP_LV_CONFIG_PATH = { value = "lvgl_conf", relative = true, force = false }
BINDGEN_EXTRA_CLANG_ARGS = { value = "-isystem C:/Users/77077/.rustup/toolchains/esp/xtensa-esp-elf/picolibc/include -isystem C:/Users/77077/.rustup/toolchains/esp/xtensa-esp-elf/lib/gcc/xtensa-esp-elf/15.2.0/include -isystem C:/Users/77077/.rustup/toolchains/esp/xtensa-esp-elf/xtensa-esp-elf/include", force = false }
CC_xtensa_esp32_none_elf = { value = "xtensa-esp32-elf-gcc", force = false }
AR_xtensa_esp32_none_elf = { value = "xtensa-esp32-elf-ar", force = false }

[unstable]
build-std = ["core", "alloc"]
