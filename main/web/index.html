<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ESP32 BMS GPS</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { margin: 0; background: #f4f7f8; color: #142027; }
    main { width: min(760px, calc(100% - 32px)); margin: 24px auto; }
    header { display: flex; justify-content: space-between; gap: 16px; align-items: center; }
    h1 { font-size: 1.45rem; margin: 0 0 4px; letter-spacing: 0; }
    p { margin: 0; color: #53636b; }
    section { margin-top: 18px; padding-top: 18px; border-top: 1px solid #cad4d9; }
    h2 { font-size: 1rem; margin: 0 0 12px; letter-spacing: 0; }
    .section-note { margin-bottom: 12px; }
    label { display: grid; gap: 6px; margin: 12px 0; font-size: .92rem; }
    input, select, button {
      border: 1px solid #9caab2;
      border-radius: 6px;
      box-sizing: border-box;
      font: inherit;
      min-height: 42px;
      padding: 9px 11px;
      width: 100%;
    }
    button { background: #176b87; border-color: #176b87; color: white; cursor: pointer; }
    button.secondary { background: transparent; color: #176b87; }
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    form + .grid { margin-top: 12px; }
    .status { display: grid; gap: 8px; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); margin-top: 16px; }
    .metric { border-left: 3px solid #2d8a66; padding-left: 10px; }
    .metric strong { display: block; font-size: 1.2rem; }
    .candidate-list { display: grid; gap: 8px; margin: 12px 0; }
    .refs { display: flex; flex-wrap: wrap; gap: 8px 12px; margin: 8px 0 12px; font-size: .88rem; }
    .refs a { color: #176b87; }
    .candidate {
      align-items: center;
      background: transparent;
      border: 1px solid #9caab2;
      color: inherit;
      display: grid;
      gap: 4px;
      grid-template-columns: minmax(0, 1fr) auto;
      min-height: 46px;
      padding: 8px 10px;
      text-align: left;
    }
    .candidate strong, .candidate span { overflow-wrap: anywhere; }
    .candidate small { color: #53636b; }
    .field-hint { color: #a05b00; min-height: 1.2em; }
    @media (prefers-color-scheme: dark) {
      body { background: #101719; color: #e8eff2; }
      p { color: #9facb2; }
      section { border-color: #2c3a40; }
      input, select, button.secondary { background: #172125; border-color: #42545d; color: #e8eff2; }
      button.secondary { color: #8ed4ee; }
      .candidate { border-color: #42545d; }
      .candidate small { color: #9facb2; }
      .field-hint { color: #f2b35f; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>ESP32 BMS GPS</h1>
        <p id="fw">固件 0.1.0</p>
      </div>
      <button class="secondary" id="refresh" type="button" data-i18n="refresh">刷新</button>
    </header>

    <div class="status">
      <div class="metric"><span data-i18n="speed">速度</span><strong id="speed">--</strong></div>
      <div class="metric"><span data-i18n="battery">电池</span><strong id="battery">--</strong></div>
      <div class="metric"><span>BMS</span><strong id="bms">--</strong></div>
      <div class="metric"><span data-i18n="protections">保护</span><strong id="bms-protections">--</strong></div>
      <div class="metric"><span data-i18n="warnings">告警</span><strong id="bms-warnings">--</strong></div>
      <div class="metric"><span>Wi-Fi</span><strong id="wifi">--</strong></div>
    </div>

    <section>
      <h2 data-i18n="setupAp">设置热点</h2>
      <p class="section-note"><span data-i18n="setupApPurpose">手机连接热点后访问</span> <strong>192.168.4.1</strong></p>
      <form id="ap-form">
        <label><span data-i18n="setupApPassword">设置热点密码</span><input name="password" type="password" autocomplete="new-password" inputmode="numeric" minlength="8" maxlength="8" pattern="[0-9]{8}"></label>
        <button type="submit" data-i18n="saveApPassword">保存热点密码</button>
      </form>
    </section>

    <section>
      <h2 data-i18n="bmsBoard">保护板</h2>
      <p class="section-note" data-i18n="bmsPurpose">选择保护板类型，再扫描或填入蓝牙 MAC 绑定。</p>
      <form id="bms-form">
        <div class="grid">
          <label><span data-i18n="bmsType">保护板类型</span><select name="bms_type"><option value="ant" data-i18n="antBms">蚂蚁 ANT</option><option value="jk" data-i18n="jkBms">极空 JK</option><option value="jbd" data-i18n="jbdBms">嘉佰达 JBD</option><option value="daly" data-i18n="dalyBms">达锂 Daly</option></select></label>
          <label><span data-i18n="bmsBleMac">蓝牙连接</span><input name="bms_mac" placeholder="AA:BB:CC:DD:EE:FF" autocomplete="off"></label>
        </div>
        <div class="refs">
          <span data-i18n="protocolRefs">协议参考</span>
          <a href="https://github.com/syssi/esphome-ant-bms" target="_blank" rel="noopener">ANT</a>
          <a href="https://github.com/mintnguyenn/esp32-jkbms-ble" target="_blank" rel="noopener">JK</a>
          <a href="https://github.com/syssi/esphome-jbd-bms" target="_blank" rel="noopener">JBD</a>
          <a href="https://github.com/syssi/esphome-daly-bms" target="_blank" rel="noopener">Daly</a>
        </div>
        <div class="grid">
          <button id="bms-scan" type="button" data-i18n="scanBms">扫描 BMS</button>
          <button id="bms-bind" class="secondary" type="button" data-i18n="bindBms">绑定 BMS</button>
        </div>
        <div id="bms-candidates" class="candidate-list"></div>
      </form>
    </section>

    <section>
      <h2 data-i18n="firmwareUpdate">固件更新</h2>
      <p class="section-note" data-i18n="otaPurpose">选择应用固件并输入随固件生成的四位验证码。</p>
      <form id="ota-form">
        <label><span data-i18n="firmwareFile">固件文件</span><input name="firmware" type="file" accept=".bin,application/octet-stream" required></label>
        <label><span data-i18n="firmwareCode">固件验证码</span><input name="code" type="text" inputmode="numeric" autocomplete="one-time-code" minlength="4" maxlength="4" pattern="[0-9]{4}" required></label>
        <button type="submit" data-i18n="uploadFirmware">上传并更新</button>
      </form>
      <p class="section-note" id="ota-status"></p>
    </section>

    <section>
      <h2 data-i18n="device">设备</h2>
      <form id="device-form">
        <div class="grid">
          <label><span data-i18n="brightness">亮度</span><input name="brightness" type="range" min="10" max="100" value="80"></label>
          <label><span data-i18n="screenRotation">屏幕方向</span><select name="display_rotation"><option value="portrait" data-i18n="portrait">竖屏</option><option value="landscape" selected data-i18n="landscape">横屏</option><option value="inverted_portrait" data-i18n="invertedPortrait">反向竖屏</option><option value="inverted_landscape" data-i18n="invertedLandscape">反向横屏</option></select></label>
          <label><span data-i18n="speedUnit">速度单位</span><select name="speed_unit"><option>km/h</option><option>mph</option></select></label>
          <label><span data-i18n="speedSource">速度来源</span><select name="speed_source"><option value="gps" data-i18n="gpsSource">GPS</option><option value="controller" data-i18n="controllerSource">控制器</option></select><small class="field-hint" id="speed-source-hint"></small></label>
          <label><span data-i18n="language">语言</span><select name="language"><option value="zh" selected>中文</option><option value="en">English</option></select></label>
        </div>
        <button type="submit" data-i18n="saveDevice">保存设备设置</button>
      </form>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const I18N = {
      zh: {
        battery: "电池",
        antBms: "蚂蚁 ANT",
        bindBms: "绑定 BMS",
        bmsBleMac: "蓝牙连接",
        bmsBoard: "保护板",
        bmsPurpose: "选择保护板类型，再扫描或填入蓝牙 MAC 绑定。",
        bmsType: "保护板类型",
        brightness: "亮度",
        connected: "已连接",
        connecting: "连接中",
        controllerOfflineUsingGps: "控制器离线·当前 GPS",
        controllerSource: "控制器",
        dalyBms: "达锂 Daly",
        device: "设备",
        failed: "失败",
        firmware: "固件",
        firmwareCode: "固件验证码",
        firmwareFile: "固件文件",
        firmwareUpdate: "固件更新",
        jbdBms: "嘉佰达 JBD",
        jkBms: "极空 JK",
        invertedLandscape: "反向横屏",
        invertedPortrait: "反向竖屏",
        landscape: "横屏",
        language: "语言",
        offline: "离线",
        online: "在线",
        otaCodeMismatch: "固件验证码不匹配",
        otaFailed: "固件更新失败",
        otaInvalidCode: "请输入四位数字验证码",
        otaInvalidImage: "固件格式无效",
        otaPurpose: "选择应用固件并输入随固件生成的四位验证码。",
        otaRebooting: "校验通过，设备正在重启",
        otaSelectFile: "请选择固件文件",
        otaTooLarge: "固件超过 OTA 分区容量",
        otaUploading: "固件上传中，请勿断开连接",
        portrait: "竖屏",
        protections: "保护",
        protocolRefs: "协议参考",
        refresh: "刷新",
        saveApPassword: "保存热点密码",
        saveDevice: "保存设备设置",
        scanBms: "扫描 BMS",
        screenRotation: "屏幕方向",
        setup: "设置",
        setupAp: "设置热点",
        setupApPassword: "设置热点密码",
        setupApPurpose: "手机连接热点后访问",
        speed: "速度",
        speedSource: "速度来源",
        speedUnit: "速度单位",
        uploadFirmware: "上传并更新",
        gpsSource: "GPS",
        warnings: "告警"
      },
      en: {
        battery: "Battery",
        antBms: "ANT",
        bindBms: "Bind BMS",
        bmsBleMac: "Bluetooth connection",
        bmsBoard: "BMS",
        bmsPurpose: "Choose a BMS type, then scan or enter a Bluetooth MAC to bind.",
        bmsType: "BMS type",
        brightness: "Brightness",
        connected: "connected",
        connecting: "connecting",
        controllerOfflineUsingGps: "Controller offline · using GPS",
        controllerSource: "Controller",
        dalyBms: "Daly",
        device: "Device",
        failed: "failed",
        firmware: "Firmware",
        firmwareCode: "Firmware code",
        firmwareFile: "Firmware file",
        firmwareUpdate: "Firmware update",
        jbdBms: "JBD",
        jkBms: "JK",
        invertedLandscape: "Inverted landscape",
        invertedPortrait: "Inverted portrait",
        landscape: "Landscape",
        language: "Language",
        offline: "offline",
        online: "online",
        otaCodeMismatch: "Firmware code does not match",
        otaFailed: "Firmware update failed",
        otaInvalidCode: "Enter the four-digit firmware code",
        otaInvalidImage: "Invalid firmware image",
        otaPurpose: "Select an app image and enter its generated four-digit code.",
        otaRebooting: "Verified; the device is restarting",
        otaSelectFile: "Select a firmware file",
        otaTooLarge: "Firmware exceeds the OTA partition size",
        otaUploading: "Uploading firmware; keep the connection open",
        portrait: "Portrait",
        protections: "Protections",
        protocolRefs: "Protocol refs",
        refresh: "Refresh",
        saveApPassword: "Save AP Password",
        saveDevice: "Save Device Settings",
        scanBms: "Scan BMS",
        screenRotation: "Screen rotation",
        setup: "setup",
        setupAp: "Setup AP",
        setupApPassword: "Setup AP password",
        setupApPurpose: "Connect to the hotspot, then open",
        speed: "Speed",
        speedSource: "Speed source",
        speedUnit: "Speed unit",
        uploadFirmware: "Upload and update",
        gpsSource: "GPS",
        warnings: "Warnings"
      }
    };
    let uiLanguage = "zh";
    let bmsScanPollTimer = 0;
    let bmsScanPollDeadline = 0;
    let lastConfig = {};

    function t(key) {
      return (I18N[uiLanguage] || I18N.zh)[key] || I18N.zh[key] || key;
    }

    function applyLanguage(language) {
      uiLanguage = language === "en" ? "en" : "zh";
      document.documentElement.lang = uiLanguage === "en" ? "en" : "zh-CN";
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        node.textContent = t(node.dataset.i18n);
      });
      updateSpeedSourceHint(lastConfig);
    }

    function updateSpeedSourceHint(config = lastConfig) {
      const source = $("device-form").elements.speed_source.value;
      const fallbackActive = config.active_speed_source === "gps";
      $("speed-source-hint").textContent =
        source === "controller" && config.controller_online !== true && fallbackActive
          ? t("controllerOfflineUsingGps")
          : "";
    }

    async function api(path, options = {}) {
      const headers = new Headers(options.headers || {});
      const res = await fetch(path, { ...options, headers });
      if (!res.ok) {
        const detail = await res.text();
        throw new Error(detail || `${res.status} ${res.statusText}`);
      }
      return res.headers.get("content-type")?.includes("application/json") ? res.json() : res.text();
    }

    function otaError(status) {
      if (status === 403) return t("otaCodeMismatch");
      if (status === 413) return t("otaTooLarge");
      if (status === 422) return t("otaInvalidImage");
      return t("otaFailed");
    }

    async function uploadFirmware(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const file = form.elements.firmware.files[0];
      const code = form.elements.code.value.trim();
      if (!file) {
        $("ota-status").textContent = t("otaSelectFile");
        return;
      }
      if (!/^[0-9]{4}$/.test(code)) {
        $("ota-status").textContent = t("otaInvalidCode");
        return;
      }

      const button = form.querySelector("button");
      button.disabled = true;
      $("ota-status").textContent = t("otaUploading");
      try {
        const response = await fetch("/api/ota", {
          method: "POST",
          headers: {
            "Content-Type": "application/octet-stream",
            "X-Firmware-Code": code
          },
          body: file
        });
        if (!response.ok) throw new Error(otaError(response.status));
        $("ota-status").textContent = t("otaRebooting");
      } catch (error) {
        $("ota-status").textContent = error instanceof Error ? error.message : t("otaFailed");
      } finally {
        button.disabled = false;
      }
    }

    async function refresh() {
      try {
        const data = await api("/api/status");
        $("fw").textContent = `${t("firmware")} ${data.version ?? "0.1.0"}`;
        $("speed").textContent = data.speed ?? "--";
        $("battery").textContent = formatMillivolts(data.local_battery_mv ?? data.pack_voltage_mv);
        $("bms").textContent = formatBmsState(data);
        $("bms-protections").textContent = formatCodes(data.bms_protections);
        $("bms-warnings").textContent = formatCodes(data.bms_warnings);
        $("wifi").textContent = formatState(data.wifi);
      } catch {
        $("wifi").textContent = t("setup");
      }
    }

    function stopBmsScanPolling() {
      if (bmsScanPollTimer) clearTimeout(bmsScanPollTimer);
      bmsScanPollTimer = 0;
      bmsScanPollDeadline = 0;
      $("bms-scan").disabled = false;
    }

    async function loadBmsCandidates() {
      try {
        const data = await api("/api/bms/candidates");
        const items = Array.isArray(data.candidates) ? data.candidates : [];
        $("bms-candidates").replaceChildren(...items.map(renderBmsCandidate));
        return data.scan_active === true;
      } catch {
        $("bms-candidates").replaceChildren();
        return false;
      }
    }

    async function pollBmsCandidates() {
      const scanActive = await loadBmsCandidates();
      if (scanActive && Date.now() < bmsScanPollDeadline) {
        bmsScanPollTimer = setTimeout(pollBmsCandidates, 700);
      } else {
        stopBmsScanPolling();
      }
    }

    async function startBmsScan() {
      stopBmsScanPolling();
      $("bms-scan").disabled = true;
      await api("/api/bms/scan", { method: "POST" });
      bmsScanPollDeadline = Date.now() + 15000;
      bmsScanPollTimer = setTimeout(pollBmsCandidates, 350);
    }

    function renderBmsCandidate(candidate) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "candidate";
      const label = document.createElement("span");
      const name = candidate.name || "Ant BMS";
      label.innerHTML = `<strong></strong><small></small>`;
      label.querySelector("strong").textContent = name;
      label.querySelector("small").textContent = candidate.mac || "";
      const rssi = document.createElement("small");
      rssi.textContent = Number.isFinite(candidate.rssi) ? `${candidate.rssi} dBm` : "";
      button.append(label, rssi);
      button.addEventListener("click", () => {
        $("bms-form").elements.bms_mac.value = candidate.mac || "";
      });
      return button;
    }

    function formatMillivolts(value) {
      return Number.isFinite(value) ? `${(value / 1000).toFixed(2)} V` : "--";
    }

    function formatState(value) {
      const key = String(value || "").replace("_ap", "").replace("setup", "setup");
      return I18N[uiLanguage]?.[key] || value || "--";
    }

    function formatCodes(value) {
      return Array.isArray(value) && value.length ? value.join(" ") : "--";
    }

    function formatBmsState(data) {
      const state = formatState(data.bms);
      return data.bms_info ? `${state} ${data.bms_info}` : state;
    }

    async function loadConfig() {
      try {
        const config = await api("/api/config");
        const device = $("device-form").elements;
        const bms = $("bms-form").elements;
        lastConfig = config;
        applyLanguage(config.language ?? "zh");
        device.brightness.value = config.brightness ?? 80;
        device.display_rotation.value = config.display_rotation ?? "landscape";
        device.speed_unit.value = config.speed_unit ?? "km/h";
        device.speed_source.value = config.speed_source === "controller" ? "controller" : "gps";
        device.language.value = config.language ?? "zh";
        updateSpeedSourceHint(config);
        bms.bms_mac.value = config.bms_mac ?? "";
        const bmsType = config.bms_type ?? "ant";
        bms.bms_type.value = ["ant", "jk", "jbd", "daly"].includes(bmsType) ? bmsType : "ant";
      } catch {
      }
    }

    async function saveBmsType() {
      const bmsType = $("bms-form").elements.bms_type.value;
      await api("/api/config", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ bms_type: bmsType })
      });
      await loadConfig();
    }

    async function bindBmsMac() {
      const bms = $("bms-form").elements;
      const mac = bms.bms_mac.value.trim();
      await saveBmsType();
      if (!mac) return;
      await api("/api/bms/bind", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ mac })
      });
      await loadConfig();
    }

    function bindJsonForm(id, path) {
      $(id).addEventListener("submit", async (event) => {
        event.preventDefault();
        const body = Object.fromEntries(new FormData(event.currentTarget));
        await api(path, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body) });
        await loadConfig();
        await refresh();
      });
    }

    $("refresh").addEventListener("click", refresh);
    $("bms-scan").addEventListener("click", () => startBmsScan().catch(stopBmsScanPolling));
    $("bms-bind").addEventListener("click", () => bindBmsMac().then(refresh));
    $("bms-form").addEventListener("submit", (event) => {
      event.preventDefault();
      bindBmsMac().then(refresh);
    });
    $("bms-form").elements.bms_type.addEventListener("change", () => saveBmsType().then(refresh));
    $("device-form").elements.language.addEventListener("change", (event) => applyLanguage(event.target.value));
    $("device-form").elements.speed_source.addEventListener("change", () => updateSpeedSourceHint());
    $("ota-form").addEventListener("submit", uploadFirmware);
    $("ota-form").elements.firmware.addEventListener("change", () => {
      $("ota-form").elements.code.value = "";
      $("ota-status").textContent = "";
    });
    bindJsonForm("ap-form", "/api/ap-password");
    bindJsonForm("device-form", "/api/config");
    loadConfig().then(loadBmsCandidates).then(refresh);
  </script>
</body>
</html>
