<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ESP32 BMS GPS</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { margin: 0; background: #f5f7f8; color: #152026; }
    main { width: min(860px, calc(100% - 32px)); margin: 22px auto; }
    header { align-items: center; display: flex; gap: 12px; justify-content: space-between; }
    h1 { font-size: 1.35rem; letter-spacing: 0; margin: 0; }
    h2 { font-size: 1rem; letter-spacing: 0; margin: 0 0 12px; }
    p { color: #52646d; margin: 6px 0 0; }
    section { border-top: 1px solid #c9d3d8; margin-top: 18px; padding-top: 18px; }
    label { display: grid; gap: 6px; margin: 12px 0; }
    input, select, button {
      border: 1px solid #9baab2;
      border-radius: 6px;
      box-sizing: border-box;
      font: inherit;
      min-height: 42px;
      padding: 9px 11px;
      width: 100%;
    }
    button { background: #176b87; border-color: #176b87; color: white; cursor: pointer; }
    button.secondary { background: transparent; color: #176b87; }
    button:disabled { cursor: not-allowed; opacity: .58; }
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .status { display: grid; gap: 8px; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
    .metric { border-left: 3px solid #2d8a66; padding-left: 10px; }
    .metric strong { display: block; font-size: 1.15rem; overflow-wrap: anywhere; }
    .candidate-list { display: grid; gap: 8px; margin: 12px 0; }
    .candidate {
      align-items: center;
      background: transparent;
      border: 1px solid #9baab2;
      color: inherit;
      display: grid;
      gap: 4px;
      grid-template-columns: minmax(0, 1fr) auto;
      min-height: 46px;
      padding: 8px 10px;
      text-align: left;
    }
    .candidate strong, .candidate span { overflow-wrap: anywhere; }
    .candidate small { color: #52646d; }
    #log { white-space: pre-wrap; }
    @media (prefers-color-scheme: dark) {
      body { background: #101719; color: #e8eff2; }
      p { color: #9facb2; }
      section { border-color: #2c3a40; }
      input, select, button.secondary { background: #172125; border-color: #42545d; color: #e8eff2; }
      button.secondary { color: #8ed4ee; }
      .candidate { border-color: #42545d; }
      .candidate small { color: #9facb2; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>ESP32 BMS GPS</h1>
        <p id="state">未连接</p>
      </div>
      <button class="secondary" id="refresh" type="button" data-i18n="refresh">刷新</button>
    </header>

    <section>
      <h2 data-i18n="connection">连接</h2>
      <div class="grid">
        <label><span data-i18n="deviceAddress">设备地址</span><input id="base" value="http://192.168.4.1" inputmode="url"></label>
      </div>
      <div class="grid">
        <button id="connect-http" type="button" data-i18n="connectHttp">连接热点 API</button>
        <button id="connect-ble" class="secondary" type="button" data-i18n="connectBle">连接蓝牙</button>
        <button id="clear-password" class="secondary" type="button" data-i18n="clearPassword">清除密码</button>
      </div>
    </section>

    <section>
      <h2 data-i18n="status">状态</h2>
      <div class="status">
        <div class="metric"><span data-i18n="speed">速度</span><strong id="speed">--</strong></div>
        <div class="metric"><span data-i18n="battery">电池</span><strong id="battery">--</strong></div>
        <div class="metric"><span>BMS</span><strong id="bms">--</strong></div>
        <div class="metric"><span>Wi-Fi</span><strong id="wifi">--</strong></div>
        <div class="metric"><span>OTA</span><strong id="ota">--</strong></div>
      </div>
    </section>

    <section>
      <h2>Wi-Fi</h2>
      <form id="wifi-form">
        <div class="grid">
          <label><span data-i18n="externalSsid">外部 Wi-Fi SSID</span><input name="ssid" maxlength="32" autocomplete="off"></label>
          <label><span data-i18n="externalPassword">外部 Wi-Fi 密码</span><input name="password" type="password" maxlength="64" autocomplete="new-password"></label>
        </div>
        <button type="submit" data-i18n="saveWifi">保存 Wi-Fi</button>
      </form>
    </section>

    <section>
      <h2 data-i18n="setupAp">设置热点</h2>
      <form id="ap-form">
        <label><span data-i18n="newSetupPassword">新设置密码</span><input name="password" type="password" minlength="8" maxlength="64" autocomplete="new-password"></label>
        <button type="submit" data-i18n="saveApPassword">保存热点密码</button>
      </form>
    </section>

    <section>
      <h2 data-i18n="device">设备</h2>
      <form id="config-form">
        <div class="grid">
          <label><span data-i18n="brightness">亮度</span><input name="brightness" type="range" min="10" max="100" value="80"></label>
          <label><span data-i18n="screenRotation">屏幕方向</span><select name="display_rotation"><option value="portrait" data-i18n="portrait">竖屏</option><option value="landscape" data-i18n="landscape">横屏</option><option value="inverted_portrait" data-i18n="invertedPortrait">反向竖屏</option><option value="inverted_landscape" data-i18n="invertedLandscape">反向横屏</option></select></label>
          <label><span data-i18n="speedUnit">速度单位</span><select name="speed_unit"><option>km/h</option><option>mph</option></select></label>
          <label><span data-i18n="language">语言</span><select name="language"><option value="zh">中文</option><option value="en">English</option></select></label>
          <label>BMS MAC<input name="bms_mac" placeholder="AA:BB:CC:DD:EE:FF" autocomplete="off"></label>
        </div>
        <div class="grid">
          <button id="bms-scan" type="button" data-i18n="scanBms">扫描 BMS</button>
          <button id="bms-bind" class="secondary" type="button" data-i18n="bindBms">绑定 BMS</button>
        </div>
        <div id="bms-candidates" class="candidate-list"></div>
        <button type="submit" data-i18n="saveDevice">保存设备设置</button>
      </form>
    </section>

    <section>
      <h2>OTA</h2>
      <div class="grid">
        <button id="ota-check" type="button" data-i18n="checkUpdate">检查更新</button>
        <button id="ota-start" type="button" data-i18n="startUpdate">开始更新</button>
      </div>
    </section>

    <section>
      <h2 data-i18n="log">日志</h2>
      <p id="log"></p>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const CONTROL_SERVICE_UUID = "7b47f060-0f68-4ad2-9a25-7f3d36a6c7a1";
    const CONTROL_TX_UUID = "7b47f061-0f68-4ad2-9a25-7f3d36a6c7a1";
    const CONTROL_RX_UUID = "7b47f062-0f68-4ad2-9a25-7f3d36a6c7a1";
    const encoder = new TextEncoder();
    const decoder = new TextDecoder();
    const I18N = {
      zh: {
        battery: "电池",
        bindBms: "绑定 BMS",
        brightness: "亮度",
        checkUpdate: "检查更新",
        checking: "检查中",
        clearPassword: "清除密码",
        connectBle: "连接蓝牙",
        connectHttp: "连接热点 API",
        connected: "已连接",
        connecting: "连接中",
        connection: "连接",
        device: "设备",
        deviceAddress: "设备地址",
        disabled: "关闭",
        downloading: "下载中",
        externalPassword: "外部 Wi-Fi 密码",
        externalSsid: "外部 Wi-Fi SSID",
        failed: "失败",
        firmware: "固件",
        idle: "空闲",
        invertedLandscape: "反向横屏",
        invertedPortrait: "反向竖屏",
        language: "语言",
        landscape: "横屏",
        log: "日志",
        newSetupPassword: "新设置密码",
        offline: "离线",
        online: "在线",
        passwordCanceled: "已取消密码输入",
        passwordCleared: "密码已清除",
        passwordPrompt: "输入 ESP32 设置密码",
        passwordWrong: "密码错误",
        portrait: "竖屏",
        refresh: "刷新",
        saveApPassword: "保存热点密码",
        saveDevice: "保存设备设置",
        saveWifi: "保存 Wi-Fi",
        scanBms: "扫描 BMS",
        screenRotation: "屏幕方向",
        setup: "设置",
        setupAp: "设置热点",
        setupApOnly: "设置热点",
        speed: "速度",
        speedUnit: "速度单位",
        startUpdate: "开始更新",
        status: "状态",
        readyToReboot: "待重启",
        updateAvailable: "有更新",
        verifying: "校验中"
      },
      en: {
        battery: "Battery",
        bindBms: "Bind BMS",
        brightness: "Brightness",
        checkUpdate: "Check Update",
        checking: "checking",
        clearPassword: "Clear Password",
        connectBle: "Connect Bluetooth",
        connectHttp: "Connect Hotspot API",
        connected: "connected",
        connecting: "connecting",
        connection: "Connection",
        device: "Device",
        deviceAddress: "Device address",
        disabled: "disabled",
        downloading: "downloading",
        externalPassword: "External password",
        externalSsid: "External SSID",
        failed: "failed",
        firmware: "Firmware",
        idle: "idle",
        invertedLandscape: "Inverted landscape",
        invertedPortrait: "Inverted portrait",
        language: "Language",
        landscape: "Landscape",
        log: "Log",
        newSetupPassword: "New setup password",
        offline: "offline",
        online: "online",
        passwordCanceled: "Password entry canceled",
        passwordCleared: "Password cleared",
        passwordPrompt: "Enter ESP32 setup password",
        passwordWrong: "Wrong password",
        portrait: "Portrait",
        refresh: "Refresh",
        saveApPassword: "Save AP Password",
        saveDevice: "Save Device Settings",
        saveWifi: "Save Wi-Fi",
        scanBms: "Scan BMS",
        screenRotation: "Screen rotation",
        setup: "setup",
        setupAp: "Setup AP",
        setupApOnly: "setup AP",
        speed: "Speed",
        speedUnit: "Speed unit",
        startUpdate: "Start Update",
        status: "Status",
        readyToReboot: "ready to reboot",
        updateAvailable: "update available",
        verifying: "verifying"
      }
    };
    const state = {
      language: "zh",
      transport: "http",
      setupPassword: sessionStorage.getItem("setupPassword") || "",
      ble: { device: null, tx: null, rx: null, buffer: "", pending: new Map() }
    };

    function t(key) {
      return (I18N[state.language] || I18N.zh)[key] || I18N.zh[key] || key;
    }

    function applyLanguage(language) {
      state.language = language === "en" ? "en" : "zh";
      document.documentElement.lang = state.language === "en" ? "en" : "zh-CN";
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        node.textContent = t(node.dataset.i18n);
      });
    }

    function log(line) {
      $("log").textContent = `${new Date().toLocaleTimeString()} ${line}\n` + $("log").textContent;
    }

    function setState(text) {
      $("state").textContent = text;
    }

    function requirePassword(force = false) {
      if (force || !state.setupPassword) {
        state.setupPassword = prompt(t("passwordPrompt"), state.setupPassword) || "";
      }
      if (!state.setupPassword) throw new Error(t("passwordCanceled"));
      sessionStorage.setItem("setupPassword", state.setupPassword);
      return state.setupPassword;
    }

    function forgetPassword() {
      sessionStorage.removeItem("setupPassword");
      state.setupPassword = "";
    }

    function addAuthHeaders(headers) {
      const password = requirePassword();
      headers.set("X-Setup-Password", password);
      headers.set("Authorization", `Basic ${btoa(`esp32:${password}`)}`);
    }

    function baseUrl() {
      return $("base").value.trim().replace(/\/$/, "") || "http://192.168.4.1";
    }

    async function api(path, options = {}) {
      if (state.transport === "ble" && state.ble.tx && state.ble.rx) {
        return bleApi(path, options);
      }
      return httpApi(path, options);
    }

    async function httpApi(path, options = {}, retryAuth = true) {
      const headers = new Headers(options.headers || {});
      addAuthHeaders(headers);
      if (options.body && !headers.has("content-type")) headers.set("content-type", "application/json");
      const response = await fetchLocalDevice(baseUrl() + path, {
        ...options,
        headers,
        mode: "cors",
        cache: "no-store"
      });
      if (response.status === 401) {
        forgetPassword();
        if (retryAuth) {
          requirePassword(true);
          return httpApi(path, options, false);
        }
        throw new Error(t("passwordWrong"));
      }
      if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
      return response.headers.get("content-type")?.includes("application/json") ? response.json() : response.text();
    }

    async function fetchLocalDevice(url, options) {
      const attempts = [
        { targetAddressSpace: "local" },
        { targetAddressSpace: "private" },
        {}
      ];
      let lastError;
      for (const extra of attempts) {
        try {
          return await fetch(url, { ...options, ...extra });
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError;
    }

    async function bleApi(path, options = {}) {
      const id = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      const request = {
        id,
        method: options.method || "GET",
        path,
        setup_password: requirePassword(),
        body: options.body ? String(options.body) : ""
      };
      const promise = new Promise((resolve, reject) => {
        state.ble.pending.set(id, { resolve, reject, timer: setTimeout(() => {
          state.ble.pending.delete(id);
          reject(new Error("蓝牙请求超时"));
        }, 8000) });
      });
      try {
        await writeBleText(JSON.stringify(request) + "\n");
      } catch (error) {
        const pending = state.ble.pending.get(id);
        if (pending) {
          clearTimeout(pending.timer);
          state.ble.pending.delete(id);
          pending.reject(error);
        }
        throw error;
      }
      return promise;
    }

    async function writeBleText(text) {
      const bytes = encoder.encode(text);
      for (let offset = 0; offset < bytes.length; offset += 180) {
        const chunk = bytes.slice(offset, offset + 180);
        if (state.ble.tx.writeValueWithoutResponse) {
          await state.ble.tx.writeValueWithoutResponse(chunk);
        } else {
          await state.ble.tx.writeValue(chunk);
        }
      }
    }

    function onBleValue(event) {
      state.ble.buffer += decoder.decode(event.target.value);
      let newline = state.ble.buffer.indexOf("\n");
      while (newline >= 0) {
        const line = state.ble.buffer.slice(0, newline).trim();
        state.ble.buffer = state.ble.buffer.slice(newline + 1);
        if (line) resolveBleLine(line);
        newline = state.ble.buffer.indexOf("\n");
      }
    }

    function resolveBleLine(line) {
      let message;
      try {
        message = JSON.parse(line);
      } catch {
        log("蓝牙响应格式错误");
        return;
      }
      const pending = state.ble.pending.get(message.id);
      if (!pending) return;
      clearTimeout(pending.timer);
      state.ble.pending.delete(message.id);
      if (message.status >= 400) {
        pending.reject(new Error(message.error || `蓝牙 ${message.status}`));
        return;
      }
      if (typeof message.body === "string" && message.body.trim().startsWith("{")) {
        pending.resolve(JSON.parse(message.body));
      } else {
        pending.resolve(message.body || "");
      }
    }

    async function connectHttp() {
      state.transport = "http";
      requirePassword();
      await loadConfig();
      await refresh();
      setState(`HTTP ${baseUrl()}`);
      log("热点 API 已连接");
    }

    async function connectBle() {
      if (!navigator.bluetooth) {
        log("当前浏览器不支持 Web Bluetooth");
        return;
      }
      const device = await navigator.bluetooth.requestDevice({
        acceptAllDevices: true,
        optionalServices: [CONTROL_SERVICE_UUID]
      });
      const server = await device.gatt.connect();
      state.ble.device = device;
      device.addEventListener("gattserverdisconnected", () => {
        state.transport = "http";
        state.ble.tx = null;
        state.ble.rx = null;
        setState("蓝牙已断开");
      });
      try {
        const service = await server.getPrimaryService(CONTROL_SERVICE_UUID);
        state.ble.tx = await service.getCharacteristic(CONTROL_TX_UUID);
        state.ble.rx = await service.getCharacteristic(CONTROL_RX_UUID);
        await state.ble.rx.startNotifications();
        state.ble.rx.addEventListener("characteristicvaluechanged", onBleValue);
        state.transport = "ble";
        await loadConfig();
        await refresh();
        setState(`BLE ${device.name || device.id}`);
        log("蓝牙控制已连接");
      } catch (error) {
        state.transport = "http";
        setState(`BLE ${device.name || device.id}`);
        log("蓝牙已连接，但固件未暴露控制服务");
      }
    }

    async function refresh() {
      const data = await api("/api/status");
      $("speed").textContent = `${data.speed || "--"} ${data.speed_unit || ""}`.trim();
      $("battery").textContent = formatMillivolts(data.local_battery_mv ?? data.pack_voltage_mv);
      $("bms").textContent = formatState(data.bms);
      $("wifi").textContent = formatState(data.wifi);
      $("ota").textContent = formatState(data.ota);
      setState(`${state.transport.toUpperCase()} ${t("firmware")} ${data.version || "--"}`);
    }

    async function loadConfig() {
      const config = await api("/api/config");
      const wifi = $("wifi-form").elements;
      const form = $("config-form").elements;
      applyLanguage(config.language ?? "zh");
      wifi.ssid.value = config.external_ssid || "";
      form.brightness.value = config.brightness || 80;
      form.display_rotation.value = config.display_rotation || "landscape";
      form.speed_unit.value = config.speed_unit || "km/h";
      form.language.value = config.language || "zh";
      form.bms_mac.value = config.bms_mac || "";
    }

    async function loadBmsCandidates() {
      const data = await api("/api/bms/candidates");
      const items = Array.isArray(data.candidates) ? data.candidates : [];
      $("bms-candidates").replaceChildren(...items.map(renderBmsCandidate));
    }

    function renderBmsCandidate(candidate) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "candidate";
      const label = document.createElement("span");
      const name = document.createElement("strong");
      const mac = document.createElement("small");
      const rssi = document.createElement("small");
      name.textContent = candidate.name || "Ant BMS";
      mac.textContent = candidate.mac || "";
      rssi.textContent = Number.isFinite(candidate.rssi) ? `${candidate.rssi} dBm` : "";
      label.append(name, mac);
      button.append(label, rssi);
      button.addEventListener("click", () => {
        $("config-form").elements.bms_mac.value = candidate.mac || "";
      });
      return button;
    }

    function formatMillivolts(value) {
      return Number.isFinite(value) ? `${(value / 1000).toFixed(2)} V` : "--";
    }

    function formatState(value) {
      const labels = {
        checking: "checking",
        connected: "connected",
        connecting: "connecting",
        disabled: "disabled",
        downloading: "downloading",
        failed: "failed",
        idle: "idle",
        offline: "offline",
        online: "online",
        ready_to_reboot: "readyToReboot",
        setup_ap: "setupApOnly",
        setup_ap_only: "setupApOnly",
        station_connected: "connected",
        station_connecting: "connecting",
        update_available: "updateAvailable",
        verifying: "verifying"
      };
      const label = labels[String(value || "")];
      return label ? t(label) : value || "--";
    }

    function formJson(form) {
      return JSON.stringify(Object.fromEntries(new FormData(form)));
    }

    async function postJson(path, body) {
      await api(path, { method: "POST", body: JSON.stringify(body) });
      await loadConfig();
      await refresh();
    }

    $("connect-http").addEventListener("click", () => connectHttp().catch((error) => log(error.message)));
    $("connect-ble").addEventListener("click", () => connectBle().catch((error) => log(error.message || "蓝牙连接失败")));
    $("clear-password").addEventListener("click", () => {
      forgetPassword();
      log(t("passwordCleared"));
    });
    $("refresh").addEventListener("click", () => refresh().catch((error) => log(error.message)));
    $("wifi-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      await api("/api/wifi", { method: "POST", body: formJson(event.currentTarget) });
      await refresh();
      log("Wi-Fi 已保存");
    });
    $("ap-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      await api("/api/ap-password", { method: "POST", body: formJson(event.currentTarget) });
      state.setupPassword = event.currentTarget.elements.password.value;
      sessionStorage.setItem("setupPassword", state.setupPassword);
      log("热点密码已保存");
    });
    $("config-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      await api("/api/config", { method: "POST", body: formJson(event.currentTarget) });
      await loadConfig();
      await refresh();
      log("设备设置已保存");
    });
    $("bms-scan").addEventListener("click", () => api("/api/bms/scan", { method: "POST" }).then(loadBmsCandidates).catch((error) => log(error.message)));
    $("bms-bind").addEventListener("click", () => {
      const mac = $("config-form").elements.bms_mac.value.trim();
      if (!mac) return;
      postJson("/api/bms/bind", { mac }).then(loadBmsCandidates).catch((error) => log(error.message));
    });
    $("ota-check").addEventListener("click", () => api("/api/ota/check", { method: "POST" }).then(refresh).catch((error) => log(error.message)));
    $("ota-start").addEventListener("click", () => api("/api/ota/start", { method: "POST" }).then(refresh).catch((error) => log(error.message)));
    $("config-form").elements.language.addEventListener("change", (event) => applyLanguage(event.target.value));
    applyLanguage("zh");
  </script>
</body>
</html>
