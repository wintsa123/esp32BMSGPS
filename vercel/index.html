<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ESP32 BMS GPS</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { margin: 0; background: #f6f8f9; color: #152026; }
    main { width: min(780px, calc(100% - 32px)); margin: 22px auto; }
    header { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    h1 { font-size: 1.35rem; margin: 0; letter-spacing: 0; }
    p { color: #52646d; margin: 6px 0 0; }
    section { border-top: 1px solid #c9d3d8; margin-top: 18px; padding-top: 18px; }
    h2 { font-size: 1rem; margin: 0 0 12px; letter-spacing: 0; }
    label { display: grid; gap: 6px; margin: 12px 0; }
    input, select, button {
      border: 1px solid #9baab2;
      border-radius: 6px;
      box-sizing: border-box;
      font: inherit;
      min-height: 42px;
      padding: 9px 11px;
      width: 100%;
    }
    button { background: #176b87; border-color: #176b87; color: white; cursor: pointer; }
    button.secondary { background: transparent; color: #176b87; }
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .status { display: grid; gap: 8px; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
    .metric { border-left: 3px solid #2d8a66; padding-left: 10px; }
    .metric strong { display: block; font-size: 1.15rem; overflow-wrap: anywhere; }
    #log { white-space: pre-wrap; }
    @media (prefers-color-scheme: dark) {
      body { background: #101719; color: #e8eff2; }
      p { color: #9facb2; }
      section { border-color: #2c3a40; }
      input, select, button.secondary { background: #172125; border-color: #42545d; color: #e8eff2; }
      button.secondary { color: #8ed4ee; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>ESP32 BMS GPS</h1>
        <p id="state">未连接</p>
      </div>
      <button class="secondary" id="refresh" type="button">刷新</button>
    </header>

    <section>
      <h2>连接</h2>
      <div class="grid">
        <label>设备地址<input id="base" value="http://192.168.4.1" inputmode="url"></label>
        <label>热点密码<input id="password" type="password" autocomplete="current-password" placeholder="首次请求时会提示"></label>
      </div>
      <div class="grid">
        <button id="connect-http" type="button">连接热点 API</button>
        <button id="connect-ble" class="secondary" type="button">连接蓝牙</button>
      </div>
    </section>

    <section>
      <h2>状态</h2>
      <div class="status">
        <div class="metric"><span>速度</span><strong id="speed">--</strong></div>
        <div class="metric"><span>电池</span><strong id="battery">--</strong></div>
        <div class="metric"><span>BMS</span><strong id="bms">--</strong></div>
        <div class="metric"><span>Wi-Fi</span><strong id="wifi">--</strong></div>
      </div>
    </section>

    <section>
      <h2>Wi-Fi</h2>
      <form id="wifi-form">
        <div class="grid">
          <label>外部 Wi-Fi SSID<input name="ssid" maxlength="32" autocomplete="off"></label>
          <label>外部 Wi-Fi 密码<input name="password" type="password" maxlength="64" autocomplete="new-password"></label>
        </div>
        <button type="submit">保存 Wi-Fi</button>
      </form>
    </section>

    <section>
      <h2>设备</h2>
      <form id="config-form">
        <div class="grid">
          <label>亮度<input name="brightness" type="range" min="10" max="100" value="80"></label>
          <label>屏幕方向<select name="display_rotation"><option value="portrait">竖屏</option><option value="landscape">横屏</option><option value="inverted_portrait">反向竖屏</option><option value="inverted_landscape">反向横屏</option></select></label>
          <label>速度单位<select name="speed_unit"><option>km/h</option><option>mph</option></select></label>
          <label>BMS MAC<input name="bms_mac" placeholder="AA:BB:CC:DD:EE:FF" autocomplete="off"></label>
        </div>
        <button type="submit">保存设备设置</button>
      </form>
    </section>

    <section>
      <h2>日志</h2>
      <p id="log"></p>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    let setupPassword = sessionStorage.getItem("setupPassword") || "";

    function log(line) {
      $("log").textContent = `${new Date().toLocaleTimeString()} ${line}\n` + $("log").textContent;
    }

    function password() {
      setupPassword = $("password").value || setupPassword || prompt("输入 ESP32 设置热点密码") || "";
      $("password").value = setupPassword;
      sessionStorage.setItem("setupPassword", setupPassword);
      return setupPassword;
    }

    async function api(path, options = {}) {
      const base = $("base").value.replace(/\/$/, "");
      const headers = new Headers(options.headers || {});
      if (!(options.body instanceof FormData)) headers.set("content-type", "application/json");
      headers.set("x-setup-password", password());
      const response = await fetch(base + path, {
        ...options,
        headers,
        mode: "cors",
        cache: "no-store",
        targetAddressSpace: "private"
      });
      if (response.status === 401) {
        sessionStorage.removeItem("setupPassword");
        setupPassword = "";
        throw new Error("密码错误");
      }
      if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
      return response.headers.get("content-type")?.includes("application/json") ? response.json() : response.text();
    }

    async function refresh() {
      const data = await api("/api/status");
      $("state").textContent = `固件 ${data.version || "--"}`;
      $("speed").textContent = `${data.speed || "--"} ${data.speed_unit || ""}`;
      $("battery").textContent = formatMv(data.local_battery_mv ?? data.pack_voltage_mv);
      $("bms").textContent = data.bms || "--";
      $("wifi").textContent = data.wifi || "--";
    }

    async function loadConfig() {
      const config = await api("/api/config");
      $("wifi-form").elements.ssid.value = config.external_ssid || "";
      const form = $("config-form").elements;
      form.brightness.value = config.brightness || 80;
      form.display_rotation.value = config.display_rotation || "landscape";
      form.speed_unit.value = config.speed_unit || "km/h";
      form.bms_mac.value = config.bms_mac || "";
    }

    function formatMv(value) {
      return Number.isFinite(value) ? `${(value / 1000).toFixed(2)} V` : "--";
    }

    $("connect-http").addEventListener("click", () => loadConfig().then(refresh).then(() => log("热点 API 已连接")).catch((error) => log(error.message)));
    $("refresh").addEventListener("click", () => refresh().catch((error) => log(error.message)));
    $("wifi-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      await api("/api/wifi", { method: "POST", body: JSON.stringify(Object.fromEntries(new FormData(event.currentTarget))) });
      await refresh();
      log("Wi-Fi 已保存");
    });
    $("config-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      await api("/api/config", { method: "POST", body: JSON.stringify(Object.fromEntries(new FormData(event.currentTarget))) });
      await loadConfig();
      log("设备设置已保存");
    });

    $("connect-ble").addEventListener("click", async () => {
      if (!navigator.bluetooth) {
        log("当前浏览器不支持 Web Bluetooth");
        return;
      }
      try {
        const device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: ["0000ff00-0000-1000-8000-00805f9b34fb"]
        });
        await device.gatt.connect();
        log(`蓝牙已连接: ${device.name || device.id}`);
      } catch (error) {
        log(error.message || "蓝牙连接失败");
      }
    });
  </script>
</body>
</html>
